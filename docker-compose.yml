services:
  relay-node:
    build:
      context: .
      dockerfile: Dockerfile.relay-node
    environment:
      PORT: "8787"
      MINAMO_RELAY_TOKEN: ${MINAMO_RELAY_TOKEN:-}
      MINAMO_ALLOWED_ORIGINS: ${MINAMO_ALLOWED_ORIGINS:-}
    ports:
      - "8787:8787"

  relay-rs:
    build:
      context: ./relay-rs
      dockerfile: Dockerfile
    environment:
      MINAMO_RELAY_TOKEN: ${MINAMO_RELAY_TOKEN:-}
    ports:
      - "4433:4433/udp"
