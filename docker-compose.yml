services:
  relay-node:
    build:
      context: .
      dockerfile: Dockerfile.relay-node
    environment:
      PORT: "8787"
      KAGAMI_RELAY_TOKEN: ${KAGAMI_RELAY_TOKEN:-}
      KAGAMI_ALLOWED_ORIGINS: ${KAGAMI_ALLOWED_ORIGINS:-}
    ports:
      - "8787:8787"

  relay-rs:
    build:
      context: ./relay-rs
      dockerfile: Dockerfile
    environment:
      KAGAMI_RELAY_TOKEN: ${KAGAMI_RELAY_TOKEN:-}
    ports:
      - "4433:4433/udp"
