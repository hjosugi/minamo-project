[package]
name = "minamo-inochi2d-wasm"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
glam = "0.29"
glow = "0.14"
inox2d = { git = "https://github.com/Inochi2D/inox2d.git", rev = "df8413e6b0c525dbb880b4dca2bdf0a5d4b9aaba" }
inox2d-opengl = { git = "https://github.com/Inochi2D/inox2d.git", rev = "df8413e6b0c525dbb880b4dca2bdf0a5d4b9aaba" }
js-sys = "0.3"
wasm-bindgen = "0.2"

[dependencies.web-sys]
version = "0.3"
features = [
  "Document",
  "Element",
  "HtmlCanvasElement",
  "WebGl2RenderingContext",
  "Window",
]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
