name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint source and docs
        run: pnpm lint
      - name: Run unit and structure smoke tests
        run: pnpm test
      - name: Verify repository structure
        run: pnpm verify
      - name: TypeScript strict gate
        run: pnpm typecheck
      - name: Browser JavaScript type contract gate
        run: pnpm typecheck:js
      - name: Build production bundle
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --manifest-path relay-rs/Cargo.toml -- --check
      - run: cargo clippy --manifest-path relay-rs/Cargo.toml --all-targets -- -D warnings
      - run: cargo build --manifest-path relay-rs/Cargo.toml --release
      - run: cargo test --manifest-path relay-rs/Cargo.toml
      - run: cargo test --manifest-path crates/kgm1-codec/Cargo.toml

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build desktop frontend assets
        run: pnpm build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  relay-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node --check server.mjs
        working-directory: relay-node
      - run: pnpm test
        working-directory: relay-node
