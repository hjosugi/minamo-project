name: ci

on:
  push:
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run verify
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --manifest-path relay-rs/Cargo.toml -- --check
      - run: cargo clippy --manifest-path relay-rs/Cargo.toml --all-targets -- -D warnings
      - run: cargo build --manifest-path relay-rs/Cargo.toml --release
      - run: cargo test --manifest-path crates/kgm1-codec/Cargo.toml

  relay-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: relay-node
      - run: node --check server.mjs
        working-directory: relay-node
