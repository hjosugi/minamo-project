name: Feature request
description: Add a feature to KGM1
labels: ["type:feature"]
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: Why this feature matters.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist for completion.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests
      description: How this should be tested.
